name: release

# Build prebuilt termboy binaries and attach them to the GitHub Release.
# Fires when a release tag is pushed (their convention: v0.3.0, v0.3.1, …).
# A manual run still builds every target as a smoke test, but only tag pushes
# upload assets.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-apple-darwin
            os: macos-14
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
    steps:
      # Third-party actions are pinned to a commit SHA (not a moving tag) so a
      # compromised upstream tag can't silently change what runs here. The
      # trailing comment is the human-readable version the SHA corresponds to.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      # cpal links against ALSA on Linux.
      - name: Install Linux audio headers
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Build release binary
        run: cargo build --release --locked -p termboy --target ${{ matrix.target }}

      # ref_name/target reach the script through env, never spliced into the
      # shell body — a tag name with shell metacharacters can't inject commands.
      - name: Package tarball
        shell: bash
        env:
          REF_NAME: ${{ github.ref_name }}
          TARGET: ${{ matrix.target }}
        run: |
          staging="termboy-${REF_NAME}-${TARGET}"
          mkdir "$staging"
          cp "target/${TARGET}/release/termboy" "$staging/"
          cp README.md LICENSE "$staging/"
          tar czf "$staging.tar.gz" "$staging"
          echo "ASSET=$staging.tar.gz" >> "$GITHUB_ENV"

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: ${{ env.ASSET }}
